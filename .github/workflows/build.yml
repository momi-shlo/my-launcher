name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Web Asset
        run: |
          npm install
          npm run build

      - name: Capacitor Sync
        run: |
          npx cap init "MyLauncher" "com.shlomi.launcher" --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Force Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon --stacktrace -Dorg.gradle.internal.http.socketTimeout=60000 -Dorg.gradle.internal.http.connectionTimeout=60000

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: launcher-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
