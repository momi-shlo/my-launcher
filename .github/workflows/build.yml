name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install and Build
        run: |
          npm install
          npm run build
          npx cap init "MyLauncher" "com.shlomi.launcher" --web-dir dist
          npx cap add android
          npx cap sync android
      - name: Final Compile
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace || ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: launcher-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
